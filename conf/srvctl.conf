# ═══════════════════════════════════════════════
#  srvctl — Yapılandırma Dosyası
# ═══════════════════════════════════════════════

# PHP varsayılan versiyonu
DEFAULT_PHP_VERSION=8.3

# SSH portu
SSH_PORT=2222

# Web dizini kökü
WEB_ROOT=/var/www

# Yedekleme dizini
BACKUP_DIR=/backups

# Yedek saklama süresi (gün)
BACKUP_RETENTION_DAYS=30

# Deployer kullanıcısı
DEPLOYER_USER=deployer

# Redis admin şifresi (srvctl init tarafından doldurulur)
# REDIS_ADMIN_PASS=
